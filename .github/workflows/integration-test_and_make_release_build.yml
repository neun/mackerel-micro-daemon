name: Mackerel Micro Daemon CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ===========================================================================
  # Job 1: インテグレーションテスト + パッケージビルド（同一 FreeBSD VM）
  # ===========================================================================
  test-and-build:
    name: Test and Build on FreeBSD VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Integration Test and Build Package inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1.4.8
        with:
          envs: 'MACKEREL_API_KEY GIT_TAG'
          release: '14.4'
          run: |
            set -e

            API_BASE="https://api.mackerelio.com/api/v0"
            CONF_FILE="/usr/local/etc/mackerel-micro/mackerel-micro.conf"
            HOSTID_FILE="/var/lib/mackerel-agent/id"

            dump_log() {
              echo "--- /var/log/messages (tail -30) ---"
              tail -30 /var/log/messages || echo "(ログが読めませんでした)"
              echo "------------------------------------"

              # エラー終了時に登録済みホストが残らないよう退役処理を行う
              # HOST_ID: インテグレーションテストで登録したホスト
              # SMOKE_HOST_ID: Smoke Test で登録したホスト
              for _retire_id in "${HOST_ID:-}" "${SMOKE_HOST_ID:-}"; do
                [ -z "${_retire_id}" ] && continue
                echo "Retiring host ${_retire_id} for cleanup..."
                curl -sf -o /dev/null \
                  -X POST \
                  -H "X-Api-Key: ${MACKEREL_API_KEY}" \
                  -H "Content-Type: application/json" \
                  "${API_BASE}/hosts/${_retire_id}/retire" \
                  && echo "✔ Host ${_retire_id} retired." \
                  || echo "⚠ Failed to retire host ${_retire_id} (may already be retired)."
              done
            }

            # -----------------------------------------------------------------
            # [Preflight] 必須シークレットの存在確認
            # -----------------------------------------------------------------
            echo "::group::✅ [Preflight] Check Required Secrets"

            if [ -z "${MACKEREL_API_KEY}" ]; then
              echo "❌ Error: MACKEREL_API_KEY is empty."
              echo "   GitHub リポジトリの Settings → Secrets → Actions に"
              echo "   MACKEREL_API_KEY を登録してください。"
              exit 1
            fi
            echo "✔ MACKEREL_API_KEY is set (length=${#MACKEREL_API_KEY})"

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Setup] インストールと起動
            # -----------------------------------------------------------------
            echo "::group::✅ [Setup] Install and Start Daemon"

            pkg install -y perl5 curl

            chmod +x ./install.sh ./uninstall.sh
            ./install.sh

            echo "MACKEREL_API_KEY=${MACKEREL_API_KEY}" > "${CONF_FILE}"
            chmod 0600 "${CONF_FILE}"

            echo "✔ conf written: $(head -1 ${CONF_FILE} | sed 's/=.*/=***/')"

            service mackerel_micro start

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Test 1] ホスト自動登録の確認
            # -----------------------------------------------------------------
            echo "::group::✅ [Test 1] Host Registration"

            echo "Waiting 75 seconds for host registration and first metrics transmission..."
            sleep 75

            if [ ! -f "${HOSTID_FILE}" ]; then
              echo "❌ Error: Host ID file was not created at ${HOSTID_FILE}"
              dump_log
              exit 1
            fi

            HOST_ID=$(cat "${HOSTID_FILE}")
            echo "✔ Host registered. ID = ${HOST_ID}"

            IS_RETIRED=$(curl -sf \
              -H "X-Api-Key: ${MACKEREL_API_KEY}" \
              "${API_BASE}/hosts/${HOST_ID}" \
              | perl -MJSON::PP -e '
                my $j = JSON::PP->new->decode(join "", <STDIN>);
                print $j->{host}{isRetired} ? "1" : "0";
              ')
            if [ "${IS_RETIRED}" != "0" ]; then
              echo "❌ Error: Expected isRetired=0 (active), got isRetired=${IS_RETIRED}"
              dump_log
              exit 1
            fi
            echo "✔ Host is active (isRetired=0)"

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Test 2] 初回メトリクス送信確認 + タイムスタンプ保存
            # -----------------------------------------------------------------
            echo "::group::✅ [Test 2] Verify Initial Metrics"

            RESPONSE=$(curl -sf \
              -H "X-Api-Key: ${MACKEREL_API_KEY}" \
              "${API_BASE}/tsdb/latest?hostId=${HOST_ID}&name=memory.used")

            RESULT=$(echo "${RESPONSE}" | perl -MJSON::PP -e '
              my $j    = JSON::PP->new->decode(join "", <STDIN>);
              my $host = $ARGV[0];
              my $rec  = $j->{tsdbLatest}{$host}{"memory.used"};
              if (defined $rec && defined $rec->{value} && $rec->{value} > 0) {
                print "OK:", $rec->{time};
              } else {
                print "NG";
              }
            ' "${HOST_ID}")

            if ! echo "${RESULT}" | grep -q '^OK:'; then
              echo "❌ Error: Initial metrics not found or invalid. Response: ${RESPONSE}"
              dump_log
              exit 1
            fi

            TS_BEFORE=$(echo "${RESULT}" | cut -d: -f2)
            echo "✔ Initial metrics confirmed. timestamp = ${TS_BEFORE}"

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Test 3] デーモン再起動 + 次回送信待機
            # -----------------------------------------------------------------
            echo "::group::✅ [Test 3] Restart Daemon and Wait"

            service mackerel_micro restart

            # 固定sleepではなく、タイムスタンプが進むまで最大180秒ポーリング
            echo "Waiting for metrics transmission after restart (max 180s)..."
            ELAPSED=0
            TS_AFTER=0
            while [ "${ELAPSED}" -lt 180 ]; do
              sleep 15
              ELAPSED=$((ELAPSED + 15))

              # プロセス生存確認
              if ! kill -0 "$(cat /var/run/mackerel_micro.pid 2>/dev/null)" 2>/dev/null; then
                echo "❌ Error: Daemon process is not running at ${ELAPSED}s."
                dump_log
                exit 1
              fi

              TS_AFTER=$(curl -sf \
                -H "X-Api-Key: ${MACKEREL_API_KEY}" \
                "${API_BASE}/tsdb/latest?hostId=${HOST_ID}&name=memory.used" \
                | perl -MJSON::PP -e '
                  my $j   = JSON::PP->new->decode(join "", <STDIN>);
                  my $rec = $j->{tsdbLatest}{$ARGV[0]}{"memory.used"};
                  print defined $rec ? $rec->{time} : 0;
                ' "${HOST_ID}")
              if [ "${TS_AFTER}" -gt "${TS_BEFORE}" ]; then
                echo "✔ New metrics arrived after ${ELAPSED}s."
                break
              fi

              # 診断: daemonログにメトリクス送信成功が出ているか確認
              SENT=$(grep -c 'Metrics sent successfully' /var/log/messages 2>/dev/null || echo 0)
              echo "  waiting... (${ELAPSED}s elapsed, ts=${TS_AFTER}, metrics_sent_log=${SENT})"
            done

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Test 4] 再起動後のメトリクス確認
            # -----------------------------------------------------------------
            echo "::group::✅ [Test 4] Verify Metrics After Restart"

            RESPONSE2=$(curl -sf \
              -H "X-Api-Key: ${MACKEREL_API_KEY}" \
              "${API_BASE}/tsdb/latest?hostId=${HOST_ID}&name=memory.used")

            TS_AFTER=$(echo "${RESPONSE2}" | perl -MJSON::PP -e '
              my $j    = JSON::PP->new->decode(join "", <STDIN>);
              my $host = $ARGV[0];
              my $rec  = $j->{tsdbLatest}{$host}{"memory.used"};
              print defined $rec ? $rec->{time} : 0;
            ' "${HOST_ID}")

            if [ "${TS_AFTER}" -le "${TS_BEFORE}" ]; then
              echo "❌ Error: Metrics timestamp did not advance after restart."
              echo "   before=${TS_BEFORE}  after=${TS_AFTER}"
              dump_log
              exit 1
            fi
            echo "✔ Metrics updated after restart. timestamp ${TS_BEFORE} → ${TS_AFTER}"

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Test 5] ホスト退役
            # -----------------------------------------------------------------
            echo "::group::✅ [Test 5] Retire Host"

            RETIRE_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "X-Api-Key: ${MACKEREL_API_KEY}" \
              -H "Content-Type: application/json" \
              "${API_BASE}/hosts/${HOST_ID}/retire")

            if [ "${RETIRE_CODE}" != "200" ]; then
              echo "❌ Error: Retire API returned HTTP ${RETIRE_CODE}"
              dump_log
              exit 1
            fi

            IS_RETIRED_AFTER=$(curl -sf \
              -H "X-Api-Key: ${MACKEREL_API_KEY}" \
              "${API_BASE}/hosts/${HOST_ID}" \
              | perl -MJSON::PP -e '
                my $j = JSON::PP->new->decode(join "", <STDIN>);
                print $j->{host}{isRetired} ? "1" : "0";
              ')
            if [ "${IS_RETIRED_AFTER}" != "1" ]; then
              echo "❌ Error: Expected isRetired=1 after retire, got isRetired=${IS_RETIRED_AFTER}"
              dump_log
              exit 1
            fi
            echo "✔ Host ${HOST_ID} retired successfully (isRetired=1)."

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Test 6] 退役後にメトリクスが送信されていないことを確認
            # -----------------------------------------------------------------
            echo "::group::✅ [Test 6] Verify No New Metrics After Retire"

            # 退役後120秒待つのではなく、タイムスタンプが変わらないことを確認しながら待つ
            # 退役後もデーモンが1回分のメトリクスを送ってから止まる可能性があるため
            # 2周期分(120秒)待ってからタイムスタンプを比較する
            echo "Waiting 120 seconds to confirm metrics transmission has stopped..."
            sleep 120

            TS_RETIRED=$(curl -sf \
              -H "X-Api-Key: ${MACKEREL_API_KEY}" \
              "${API_BASE}/tsdb/latest?hostId=${HOST_ID}&name=memory.used" \
              | perl -MJSON::PP -e '
                my $j    = JSON::PP->new->decode(join "", <STDIN>);
                my $host = $ARGV[0];
                my $rec  = $j->{tsdbLatest}{$host}{"memory.used"};
                print defined $rec ? $rec->{time} : 0;
              ' "${HOST_ID}")

            if [ "${TS_RETIRED}" -gt "${TS_AFTER}" ]; then
              echo "❌ Error: Metrics are still being sent after host retirement!"
              echo "   after_restart=${TS_AFTER}  after_retire=${TS_RETIRED}"
              dump_log
              exit 1
            fi
            echo "✔ No new metrics sent after retirement. timestamp unchanged at ${TS_RETIRED}"

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Test 7] 無効なホスト ID で起動した際の FATAL エラー確認
            # -----------------------------------------------------------------
            echo "::group::✅ [Test 7] Verify Fatal Error on Invalid HostID"

            service mackerel_micro stop 2>/dev/null || true
            rm -f /var/run/mackerel_micro.pid

            echo "INVALID_HOST_ID_FOR_TEST" > "${HOSTID_FILE}"

            service mackerel_micro start
            sleep 10

            if ! grep -q '\[FATAL\]' /var/log/messages; then
              echo "❌ Error: Expected [FATAL] log message not found in /var/log/messages"
              dump_log
              exit 1
            fi
            echo "✔ Daemon correctly logged [FATAL] and exited on invalid Host ID."

            echo "::endgroup::"

            echo ""
            echo "🎉 All integration tests passed!"

            # -----------------------------------------------------------------
            # [Build] パッケージビルド
            # -----------------------------------------------------------------
            echo "::group::📦 [Build] Build FreeBSD Package"

            # デーモンを停止してクリーンな状態でビルド
            service mackerel_micro stop 2>/dev/null || true

            # タグから「v」を除去、非タグ起動はスナップショット扱い
            if [ -z "${GIT_TAG}" ] || [ "${GIT_TAG}" = "main" ] || [ "${GIT_TAG}" = "master" ]; then
              VERSION="0.0.0-snapshot"
            else
              VERSION="${GIT_TAG#v}"
            fi

            echo "Target Version: ${VERSION}"

            sed -i '' "s/version: \".*\"/version: \"${VERSION}\"/" manifest.ucl
            head -n 5 manifest.ucl

            pkg create -m ./manifest.ucl -r files/ -o .

            echo "--- Build Completed ---"
            ls -lh ./*.pkg

            echo "::endgroup::"

            # -----------------------------------------------------------------
            # [Smoke Test] pkg add → 起動確認 → pkg delete
            # -----------------------------------------------------------------
            echo "::group::🔍 [Smoke Test] Install Package and Verify"

            PKG_FILE=$(ls ./*.pkg | head -1)
            echo "Installing ${PKG_FILE}..."

            # インテグレーションテストでインストール済みのファイルを先に削除
            # uninstall.sh は conf・hostid を保護するため削除しない
            ./uninstall.sh

            # テスト7で退役済みのホスト ID が残っているため削除する
            # このまま起動すると [FATAL] Host not found (404) で即終了してしまう
            rm -f "${HOSTID_FILE}"

            pkg add "${PKG_FILE}"

            # pkg add で入ったデーモンを起動して新規ホスト登録まで確認
            service mackerel_micro start

            # 新規ホスト登録は起動直後に実行されるので 15 秒あれば十分
            echo "Waiting 15 seconds for fresh host registration..."
            sleep 15

            # 新しい hostid が生成されていることを確認
            if [ ! -f "${HOSTID_FILE}" ]; then
              echo "❌ Error: Host ID file was not created after pkg add."
              dump_log
              exit 1
            fi

            SMOKE_HOST_ID=$(cat "${HOSTID_FILE}")

            # プロセスが生きているか確認（pidfile が存在し、プロセスが動いていること）
            if [ ! -f /var/run/mackerel_micro.pid ] || \
               ! kill -0 "$(cat /var/run/mackerel_micro.pid)" 2>/dev/null; then
              echo "❌ Error: Daemon exited unexpectedly after pkg add."
              dump_log
              exit 1
            fi
            echo "✔ Daemon is running and registered as new host. ID = ${SMOKE_HOST_ID}"

            # 正常起動を確認したら停止・退役・アンインストール
            service mackerel_micro stop

            curl -sf -o /dev/null \
              -X POST \
              -H "X-Api-Key: ${MACKEREL_API_KEY}" \
              -H "Content-Type: application/json" \
              "${API_BASE}/hosts/${SMOKE_HOST_ID}/retire" || true

            pkg delete -y mackerel-micro-daemon

            echo "✔ Smoke test passed. Package uninstalled."

            echo "::endgroup::"
        env:
          MACKEREL_API_KEY: ${{ secrets.MACKEREL_API_KEY }}
          GIT_TAG: ${{ github.ref_name }}

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-package
          path: '*.pkg'
          retention-days: 7

  # ===========================================================================
  # Job 2: GitHub Release（タグ起動かつビルド成功時のみ）
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Package Artifact
        uses: actions/download-artifact@v4
        with:
          name: freebsd-package

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: '*.pkg'
          generate_release_notes: true
          draft: true