name: Perl and Shell Syntax Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  perl-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.16'

      - name: Run Perl syntax check
        run: |
          perl -c files/usr/local/sbin/mackerel-micro-daemon

  shell-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run ShellCheck
        run: |
          shellcheck -e SC2034,SC1091,SC2223 files/usr/local/etc/rc.d/mackerel_micro
          shellcheck -e SC2034,SC1091,SC2223 install.sh
          shellcheck -e SC2034,SC1091,SC2223 uninstall.sh
